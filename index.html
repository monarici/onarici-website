<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenme Platformu</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            color: #333;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            height: 300px;
            border-radius: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card:hover {
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .card a {
            text-decoration: none;
            color: white;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            position: relative;
            padding: 20px;
        }

        .card-arrow {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: transparent;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            transition: all 0.3s ease;
        }

        .card:hover .card-arrow {
            transform: translate(5px, -5px);
            background: white;
        }

        .card-content {
            text-align: left;
            z-index: 2;
            font-size: 26px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 
                -1px -1px 0 #696969,
                1px -1px 0 #696969,
                -1px 1px 0 #696969,
                1px 1px 0 #696969,
                0px -1px 0 #696969,
                0px 1px 0 #696969,
                -1px 0px 0 #696969,
                1px 0px 0 #696969;
        }

        .card-icon {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .card-icon img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-logo {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .card-logo-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        .card-logo-line1 {
            font-family: 'Great Vibes', cursive;
            font-size: 48px;
            font-weight: 700;
            color: rgb(0, 0, 0);
            line-height: 1;
            margin: 0;
            letter-spacing: 1px;
        }

        .card-logo-line2 {
            font-family: 'Poppins', sans-serif;
            font-size: 56px;
            font-weight: 500;
            letter-spacing: 2px;
            color: white;
            line-height: 1;
            text-shadow: 
                -1px -1px 0 #696969,
                1px -1px 0 #696969,
                -1px 1px 0 #696969,
                1px 1px 0 #696969,
                0px -1px 0 #696969,
                0px 1px 0 #696969,
                -1px 0px 0 #696969,
                1px 0px 0 #696969;
            margin-top: 10px;
        }

        .card-person {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-person img {
            display: none;
        }

        /* Renk Paleti */
        .card-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            
        }

        .card-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .card-3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .card-4 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .card-5 {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .card-6 {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        .card-7 {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        .card-8 {
            background: url('images/mono.jpeg') center/cover no-repeat;
            position: relative;
        }

        .card-8::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
        }

        .card-8 a {
            position: relative;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .container {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
            }

            .card {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Kartı -->
        <div class="card card-1">
            <div class="card-logo">
                <div class="card-logo-text">
                    <div class="card-logo-line1">M.O</div>
                    <div class="card-logo-line2">ONARICI</div>
                </div>
            </div>
        </div>

        <!-- Yapay Zeka -->
        <div class="card card-2">
            <div class="card-icon">
                <img src="images/icon2.png" alt="Yapay Zeka">
            </div>
            <a href="#yapay-zeka">
                <div class="card-arrow">→</div>
                <div class="card-content">Yapay Zeka</div>
            </a>
        </div>

        <!-- Eğitimde Teknolojik Ortamlar -->
        <div class="card card-3">
            <div class="card-icon">
                <img src="images/icon3.png" alt="Eğitimde Teknolojik Ortamlar">
            </div>
            <a href="#egitimde-teknoloji">
                <div class="card-arrow">→</div>
                <div class="card-content">Eğitimde Teknolojik Ortamlar</div>
            </a>
        </div>

        <!-- Ağ Altyapı Sistemleri -->
        <div class="card card-4">
            <div class="card-icon">
                <img src="images/icon4.png" alt="Ağ Altyapı Sistemleri">
            </div>
            <a href="#ag-altyapı">
                <div class="card-arrow">→</div>
                <div class="card-content">Ağ Altyapı Sistemleri</div>
            </a>
        </div>

        <!-- İnternet Erişim Tipleri -->
        <div class="card card-5">
            <div class="card-icon">
                <img src="images/icon5.png" alt="İnternet Erişim Tipleri">
            </div>
            <a href="#internet-erisim">
                <div class="card-arrow">→</div>
                <div class="card-content">İnternet Erişim Tipleri</div>
            </a>
        </div>

        <!-- Küresel Haberler -->
        <div class="card card-6">
            <div class="card-icon">
                <img src="images/icon6.png" alt="Küresel Haberler">
            </div>
            <a href="#kuresel-haberler">
                <div class="card-arrow">→</div>
                <div class="card-content">Küresel Haberler</div>
            </a>
        </div>

        <!-- Öğrenme ve Gelişim Topluluğu -->
        <div class="card card-7">
            <div class="card-icon">
                <img src="images/icon7.png" alt="Öğrenme ve Gelişim Topluluğu">
            </div>
            <a href="#ogrenme-toplulugu">
                <div class="card-arrow">→</div>
                <div class="card-content">Öğrenme ve Gelişim Topluluğu</div>
            </a>
        </div>

        <!-- Kişi Rehberi -->
        <div class="card card-8">
            <a href="#kisi-rehberi">
                <div class="card-arrow">→</div>
                <div class="card-person">
                    <img src="images/mono.jpeg" alt="Kişi Rehberi">
                    <div class="card-content">Kişi Rehberi</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
