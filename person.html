<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişi Rehberi – M.Onarıcı</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .top-bar {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: stretch;
            gap: 20px;
        }

        .logo-band {
            flex: 0 0 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 18px 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.12);
            text-decoration: none;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .logo-band:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        .logo-band-name {
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            color: #fff;
            line-height: 1;
        }

        .logo-band-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 9px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .logo-band-back {
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .page-banner {
            flex: 1;
            height: 160px;
            border-radius: 24px;
            background: url('images/mono.jpeg') center/cover no-repeat;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            padding: 0 36px;
            gap: 28px;
            position: relative;
            overflow: hidden;
        }

        .page-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
        }

        .page-banner-content {
            position: relative;
            z-index: 1;
        }

        .page-banner-title {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
        }

        .page-banner-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            color: rgba(255,255,255,0.85);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        .content-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 24px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            padding: 48px 52px;
            min-height: 420px;
        }

        .content-box h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #66666633;
        }

        .content-box p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .content-box ul, .content-box ol {
            padding-left: 24px;
            color: #555;
            font-size: 16px;
            line-height: 1.9;
        }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; }
            .logo-band { flex: none; flex-direction: row; gap: 12px; padding: 14px 20px; border-radius: 16px; }
            .logo-band-back { margin-top: 0; }
            .page-banner { height: 120px; border-radius: 16px; }
            .page-banner-title { font-size: 26px; }
            .content-box { padding: 30px 22px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a class="logo-band" href="index.html" title="Ana sayfaya dön">
            <span class="logo-band-name">M.Onarıcı</span>
            <span class="logo-band-sub">Çalışma Alanı</span>
            <span class="logo-band-back">← Ana Sayfa</span>
        </a>

        <div class="page-banner">
            <div class="page-banner-content">
                <div class="page-banner-title">Kişi Rehberi</div>
                <div class="page-banner-sub">Profiller · Biyografiler · Katkılar</div>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="content-box">
            <h2>Kişi Rehberi</h2>
            <p>İçeriklerinizi buraya ekleyebilirsiniz...</p>
        </div>
    </div>

</body>
</html>
